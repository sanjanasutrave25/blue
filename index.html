<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluestock Document Verification</title>
    <style>
        /* BASE STYLES */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* HEADER & FOOTER STYLES */
        .bluestock-header, .bluestock-footer {
            background-color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
        }

        .bluestock-header { top: 0; }
        .bluestock-footer {
            bottom: 0;
            font-size: 12px;
            color: #666;
            justify-content: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            color: #3f51b5; /* Blue */
            font-weight: bold;
            font-size: 24px;
        }

        .logo-text {
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 0.5px;
        }

        .logo-in { color: #666; font-size: 14px; margin-left: -5px; }

        .sign-in-btn {
            background-color: #3f51b5;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        /* MAIN CONTENT AREA */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px; /* Space for fixed header/footer */
            box-sizing: border-box;
        }

        /* LOADING SECTION */
        #loading { text-align: center; width: 300px; }
        .loading-title { color: #3f51b5; font-size: 28px; margin-bottom: 5px; }
        .bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress { height: 100%; width: 0%; background: #3f51b5; transition: width 0.1s linear; }

        /* VERIFICATION CARD */
        .verification-card {
            background: white;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card-title {
            color: #0d2c6c; /* Dark Blue */
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-group { text-align: left; margin-bottom: 25px; }
        .input-label { display: block; font-weight: 600; color: #555; margin-bottom: 8px; font-size: 14px; }

        .styled-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .styled-input:focus {
            border-color: #3f51b5;
            outline: none;
        }

        .verify-btn {
            width: 100%;
            background-color: #3f51b5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .verify-btn:hover { background-color: #2c3e9a; }

        /* POPUP MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header {
            background-color: white;
            padding: 20px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }
        .modal-header h3 { margin: 0; color: #0d2c6c; font-size: 20px; }

        .modal-body { padding: 25px; }
        .modal-body h4 { color: #3f51b5; margin-top: 0; margin-bottom: 15px; font-size: 18px; }
        .modal-body p { margin: 8px 0; font-size: 15px; }
        .modal-body b { color: #555; width: 90px; display: inline-block; }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            text-align: right;
            background-color: #fafafa;
        }

        .close-btn {
            background-color: #3f51b5;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

    </style>
</head>
<body onload="startLoading()">

    <header class="bluestock-header">
        <div class="logo-container">
            <div class="logo-icon">//</div> <div class="logo-text">BLUESTOCK<span class="logo-in">.in</span></div>
        </div>
        <button class="sign-in-btn">Sign in</button>
    </header>

    <main class="main-container">

        <div id="loading">
            <div class="logo-container" style="justify-content: center; margin-bottom: 10px;">
                <div class="logo-icon" style="font-size: 32px;">//</div>
                <div class="logo-text" style="font-size: 28px;">BLUESTOCK<span class="logo-in">.in</span></div>
            </div>
            <p style="color: #666;">Authenticating secure connection...</p>
            <div class="bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <div id="verify" class="hidden">
            <div class="verification-card">
                <h2 class="card-title">Document Verification System</h2>
                
                <div class="input-group">
                    <label class="input-label" for="docId">Docs ID:</label>
                    <input id="docId" class="styled-input" placeholder="">
                </div>

                <button class="verify-btn" onclick="verify()">Verify Now</button>
            </div>
        </div>

    </main>

    <footer class="bluestock-footer">
        <div>HR: Bluestock Fintech • Automated Verification Portal</div>
    </footer>

    <div id="popup" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Document Verification Successful</h3>
            </div>
            <div class="modal-body">
                <h4>Verified Document Details</h4>
                <p><b>Name:</b> <span id="resName"></span></p>
                <p><b>Date:</b> <span id="resDate"></span></p>
                <p><b>Role:</b> <span id="resRole"></span></p>
                <p><b>Duration:</b> <span id="resDuration"></span></p>
                <p><b>Remark:</b> <span id="resRemark"></span></p>
            </div>
            <div class="modal-footer">
                <button class="close-btn" onclick="closePopup()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Data Store (Matching image_6 and image_5)
        const verificationDatabase = {
            "BSFTEN365": {
                name: "Krishna Kumar Sah",
                date: "2024-08-15",
                role: "SDE Intern",
                duration: "15 JUN to 15 AUG",
                remark: "Outstanding Performance"
            },
            "BFDA1148": {
                name: "Sanjana Sutrave",
                date: "2026-03-11",
                role: "Data Analyst Intern",
                duration: "11 March to 11 May",
                remark: "Outstanding Performance"
            }
        };

        // 1. LOADING ANIMATION
        function startLoading(){
            let width = 0;
            let bar = document.getElementById("progress");

            let interval = setInterval(()=>{
                width += 2; // Slower, smoother loading
                bar.style.width = width + "%";

                if(width >= 100){
                    clearInterval(interval);
                    completeLoading();
                }
            }, 50); // Updates every 50ms
        }

        function completeLoading() {
            document.getElementById("loading").style.display = "none";
            document.getElementById("verify").classList.remove("hidden");

            // 2. AUTO-FILL ID FROM QR LINK
            // After loading, check the URL for ?id=XXXXX
            const urlParams = new URLSearchParams(window.location.search);
            const idFromUrl = urlParams.get('id');
            if(idFromUrl) {
                document.getElementById("docId").value = idFromUrl.toUpperCase(); // Ensure uppercase
                // Optional: Auto-click verify after 1 second
                // setTimeout(() => { verify(); }, 1000);
            }
        }

        // 3. VERIFICATION LOGIC
        function verify(){
            let idInput = document.getElementById("docId").value.trim().toUpperCase(); // Clean input

            if(verificationDatabase[idInput]){
                showPopup(verificationDatabase[idInput]);
            } else {
                alert("Invalid Document ID. Please check and try again.");
            }
        }

        // 4. POPUP/MODAL LOGIC
        function showPopup(data){
            // Fill modal with correct data
            document.getElementById("resName").innerText = data.name;
            document.getElementById("resDate").innerText = data.date;
            document.getElementById("resRole").innerText = data.role;
            document.getElementById("resDuration").innerText = data.duration;
            document.getElementById("resRemark").innerText = data.remark;

            // Show modal
            document.getElementById("popup").classList.remove("hidden");
        }

        function closePopup(){
            document.getElementById("popup").classList.add("hidden");
        }
    </script>
</body>
</html>
